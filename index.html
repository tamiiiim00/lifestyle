<!DOCTYPE html>
<html lang="ar" dir="rtl">

*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:'Tajawal',Tahoma,Arial,sans-serif;background:#F0F4F8;color:#1E293B;direction:rtl;min-height:100vh}
.sticky-top{position:sticky;top:0;z-index:200;box-shadow:0 2px 10px rgba(0,0,0,.14)}
.hdr{background:linear-gradient(135deg,#059669 0%,#0891B2 100%);color:#fff;padding:14px 16px}
.hdr h1{font-size:18px;font-weight:700;margin-bottom:2px}
.hdr p{font-size:12px;opacity:.82}
.tabs-wrap{background:#fff;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;border-bottom:1.5px solid #E2E8F0}
.tabs-wrap::-webkit-scrollbar{display:none}
.tabs{display:flex;min-width:max-content;padding:0 8px}
.tab{padding:10px 13px;font-size:13px;font-weight:500;font-family:inherit;color:#64748B;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1.5px;cursor:pointer;white-space:nowrap;transition:color .15s,border-color .15s}
.tab.on{color:#059669;border-bottom-color:#059669;font-weight:700}
.macro-bar{display:grid;grid-template-columns:repeat(4,1fr);background:#fff;border-bottom:1px solid #E2E8F0;padding:10px 6px 8px}
.mb-i{text-align:center}
.mb-v{font-size:15px;font-weight:700}
.mb-u{font-size:10px;color:#64748B}
.mb-l{font-size:10px;color:#94A3B8;margin-top:1px}
.page{padding:12px;max-width:600px;margin:0 auto;padding-bottom:32px}
.day-hdr{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:13px;padding:12px 14px;margin-bottom:12px;border:1px solid #E2E8F0}
.day-name{font-size:16px;font-weight:700}
.typ-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px}
.tb-tr{background:#DCFCE7;color:#166534}
.tb-ca{background:#DBEAFE;color:#1E40AF}
.tb-re{background:#F1F5F9;color:#475569}
.card{background:#fff;border-radius:14px;border:1px solid #E2E8F0;margin-bottom:10px;overflow:hidden}
.card-top{display:flex;align-items:center;gap:10px;padding:12px 14px;padding-right:18px;border-right:4px solid currentColor}

.c-meta{flex:1;min-width:0}
.c-type{font-size:11px;font-weight:700;margin-bottom:1px;opacity:.8}
.c-title{font-size:14px;font-weight:700;color:#1E293B}
.c-cal{flex-shrink:0;text-align:center;background:#F8FAFC;border-radius:8px;padding:5px 9px;border:1px solid #F1F5F9}
.cal-n{font-size:15px;font-weight:700;color:#1E293B;display:block;line-height:1.2}
.cal-l{font-size:10px;color:#94A3B8}
.cf{color:#F59E0B}.cg{color:#10B981}.cp{color:#6366F1}.cb{color:#3B82F6}
.bf{background:#FFFBEB}.bg{background:#F0FDF4}.bpv{background:#EEF2FF}.bb{background:#EFF6FF}
.card-body{padding:12px 14px}
.note{background:#FFF7ED;border:1px solid #FDE68A;border-radius:8px;padding:9px 11px;font-size:12px;color:#7C2D12;margin-bottom:10px;line-height:1.6}
.note strong{display:block;font-size:13px;color:#92400E;margin-bottom:3px}
.note ol{padding-right:16px;margin-top:4px}
.items{list-style:none;margin-bottom:12px}
.items li{font-size:13px;color:#475569;padding:3px 0;display:flex;align-items:flex-start;gap:8px;line-height:1.45}
.dot{width:5px;height:5px;border-radius:50%;background:#CBD5E1;margin-top:7px;flex-shrink:0}
.mxs{display:flex;gap:6px}
.mx{flex:1;background:#F8FAFC;border:1px solid #F1F5F9;border-radius:8px;padding:6px;text-align:center}
.mx-v{font-size:13px;font-weight:700;color:#1E293B}
.mx-l{font-size:10px;color:#94A3B8}
.tog-btn{display:flex;align-items:center;gap:8px;width:100%;padding:9px 12px;border-radius:10px;cursor:pointer;font-size:12px;font-family:inherit;font-weight:700;margin-top:10px;transition:background .12s;text-align:right}
.prot-btn{background:#EFF6FF;border:1.5px dashed #93C5FD;color:#1D4ED8}
.prot-btn:hover,.prot-btn.on{background:#DBEAFE}
.tog-box{display:none;margin-top:8px;border-radius:10px;padding:11px 12px}
.tog-box.show{display:block}
.prot-box{background:#F0F9FF;border:1px solid #BAE6FD}
.tog-box ul{list-style:none;margin-bottom:10px}
.prot-box ul li{font-size:13px;color:#075985;padding:2px 0;display:flex;gap:8px}
.prot-box ul li::before{content:'+';font-weight:700;color:#0EA5E9;flex-shrink:0}
.prot-mxs{display:flex;gap:6px}
.pmx{flex:1;background:#E0F2FE;border-radius:8px;padding:5px;text-align:center}
.pmx-v{font-size:12px;font-weight:700;color:#0C4A6E}
.pmx-l{font-size:10px;color:#0369A1}
.day-total{background:#fff;border-radius:14px;border:1px solid #E2E8F0;padding:14px;margin-bottom:10px}
.day-total h3{font-size:13px;font-weight:700;color:#64748B;margin-bottom:10px}
.tot-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.tot-box{background:#F8FAFC;border-radius:10px;padding:10px;text-align:center}
.tot-v{font-size:18px;font-weight:700;color:#1E293B}
.tot-l{font-size:11px;color:#94A3B8;margin-top:2px}
.notes-card{background:#fff;border-radius:14px;border:1px solid #E2E8F0;padding:14px;margin-top:4px}
.notes-card h3{font-size:14px;font-weight:700;margin-bottom:10px}
.note-row{display:flex;align-items:flex-start;gap:8px;padding:4px 0;font-size:13px;color:#475569;line-height:1.5}
.n-ico{width:18px;height:18px;border-radius:50%;background:#DCFCE7;display:flex;align-items:center;justify-content:center;color:#166534;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px}
.notes-link{background:#F0FDF4;border:1px solid #86EFAC;border-radius:10px;padding:10px 14px;font-family:inherit;font-size:13px;color:#166534;cursor:pointer;width:100%;margin-top:6px;display:block;text-align:center}
.supps{background:#fff;border-radius:14px;border:1px solid #E2E8F0;padding:14px;margin-top:10px}
.supps h3{font-size:14px;font-weight:700;margin-bottom:12px}
.sgrp{margin-bottom:14px}
.sgrp:last-child{margin-bottom:0}
.spri{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;display:inline-block;margin-bottom:8px}
.scard{border-radius:10px;padding:10px 12px;margin-bottom:7px;border-right:3px solid currentColor}
.scard:last-child{margin-bottom:0}
.sname{font-size:13px;font-weight:700}
.sdose{font-size:12px;color:#475569;margin-top:2px}
.swhy{font-size:12px;color:#64748B;margin-top:4px;line-height:1.5}
.sfoot{font-size:11px;color:#94A3B8;margin-top:10px;padding-top:10px;border-top:1px solid #F1F5F9}

.card-f{--mc:#F59E0B;--mb:#FFFBEB;--mt:#92400E}
.card-g{--mc:#10B981;--mb:#F0FDF4;--mt:#065F46}
.card-a{--mc:#6366F1;--mb:#EEF2FF;--mt:#4338CA}
.card-s{--mc:#3B82F6;--mb:#EFF6FF;--mt:#1D4ED8}

.swap-lbl{font-size:11px;font-weight:700;color:#94A3B8;margin-bottom:6px}
.pills-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.pills-row::-webkit-scrollbar{display:none}
.pill{padding:5px 11px;border-radius:16px;font-size:12px;font-family:inherit;font-weight:500;cursor:pointer;white-space:nowrap;border:1.5px solid #E2E8F0;background:#fff;color:#64748B;flex-shrink:0;transition:all .12s}

.trh{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.tlbl{font-size:12px;color:#64748B}
.tval{font-size:13px;font-weight:700;color:#1E293B}
.pb{background:#F1F5F9;border-radius:4px;height:5px}
.pbf{height:100%;border-radius:4px;transition:width .3s ease}
.pbc{background:#059669}.pbp{background:#3B82F6}.pbk{background:#F59E0B}.pbd{background:#EF4444}.pbw{background:#DC2626}

.cust-iw{display:flex;flex-direction:column;gap:3px}

.cust-il{font-size:10px;color:#94A3B8;text-align:center}
.cust-btns{display:flex;gap:8px;flex-direction:row-reverse}
.cust-save{padding:8px 18px;background:#059669;color:#fff;border:none;border-radius:8px;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer}

.cbadge{display:flex;align-items:center;justify-content:space-between;background:#DCFCE7;border:1px solid #86EFAC;border-radius:8px;padding:8px 10px;margin-top:8px;font-size:12px;color:#166534;font-weight:500}
.cbadge-x{padding:2px 8px;background:none;border:1px solid #22C55E;border-radius:5px;cursor:pointer;font-size:11px;color:#166534;font-family:inherit}

</style>

var cur=0,S={};
function gs(di,mi){var k=di+'_'+mi;if(!S[k])S[k]={};return S[k];}
function r5(x){return Math.round(x/5)*5;}
function eggWord(n){return n==1?'بيضة':(n==2?'بيضتان':'بيضات');}
function sliceWord(n){return n==1?'شريحة':(n==2?'شريحتان':'شرائح');}
function snById(id){for(var i=0;i<SNACKS.length;i++)if(SNACKS[i].id==id)return SNACKS[i];return SNACKS[0];}
function pLine(slot,sel){var F=PF[sel],C=slot.cal;
  if(F.egg){var n=Math.round(C/F.egg);return n+' '+eggWord(n)+' مسخنة (scrambled)';}
  var g=r5(C/F.dc*100);return g+'جم '+F.n+(F.raw?' (وزن نيء)':'');}
function cLine(slot,sel){var F=CF[sel],C=slot.cal;
  if(F.slice){var n=Math.round(C/F.slice);return n+' '+sliceWord(n)+' '+F.n;}
  var g=r5(C/F.dc*100);return g+'جم '+F.n+(F.dry?' (وزن جاف)':' مطبوخ');}
function atwCal(p,c,f){return Math.round(4*p+4*c+9*f);}
function getMM(di,mi){var m=D[di].meals[mi],s=gs(di,mi);
  if(s.cust)return{cal:s.cust.cal,p:s.cust.p,c:s.cust.c,f:s.cust.f,cu:1};
  if(m.mt=='s'){var sn=snById(s.sSel||m.def);return{cal:atwCal(sn.p,sn.c,sn.f),p:sn.p,c:sn.c,f:sn.f};}
  return {cal:atwCal(m.p,m.c,m.f),p:m.p,c:m.c,f:m.f};}
function dayTot(di){var t={cal:0,p:0,c:0,f:0};for(var i=0;i<D[di].meals.length;i++){var mm=getMM(di,i);t.cal+=mm.cal;t.p+=mm.p;t.c+=mm.c;t.f+=mm.f;}return t;}
function pills(di,mi,which,slot){
  var s=gs(di,mi),sel=(which=='p'?s.pSel:s.cSel)||slot.def,FT=(which=='p'?PF:CF);
  var lbl=which=='p'?'بدّل مصدر البروتين':'بدّل مصدر الكارب';
  var h='<div class="swap-wrap"><div class="swap-lbl">'+lbl+'</div><div class="pills-row">';
  for(var i=0;i<slot.opts.length;i++){var o=slot.opts[i],a=o==sel?' active':'';
    h+='<button class="pill'+a+'" onclick="setSel('+di+','+mi+',\''+which+'\',\''+o+'\')">'+FT[o].n+'</button>';}
  return h+'</div></div>';}
function snackPills(di,mi,sel){
  var h='<div class="swap-wrap"><div class="swap-lbl">بدّل السناك (اختر اللي يعجبك)</div><div class="pills-row">';
  for(var i=0;i<SNACKS.length;i++){var o=SNACKS[i],a=o.id==sel?' active':'';
    var tag=o.pw?'':'';
    h+='<button class="pill'+a+'" onclick="setSnack('+di+','+mi+',\''+o.id+'\')">'+tag+o.sh+'</button>';}
  return h+'</div></div>';}
function mxbox(mm){
  return '<div class="mxs"><div class="mx"><div class="mx-v cp">'+mm.p+'ج</div><div class="mx-l">بروتين</div></div>'
    +'<div class="mx"><div class="mx-v cg">'+mm.c+'ج</div><div class="mx-l">كارب</div></div>'
    +'<div class="mx"><div class="mx-v cf">'+mm.f+'ج</div><div class="mx-l">دهون</div></div></div>';}
function custUI(di,mi){
  var h='<button class="cust-btn" onclick="tglCust('+di+','+mi+')">أكلت شي ثاني؟ عدّل الوجبة</button>';
  h+='<div class="cust-panel" id="cp'+di+'_'+mi+'">';
  h+='<input class="cust-tin" id="cn'+di+'_'+mi+'" placeholder="اسم الأكل (مثلاً: شاورما)">';
  h+='<div class="cust-grid">';
  h+='<div class="cust-iw"><input class="cust-num" id="cc'+di+'_'+mi+'" type="number" inputmode="numeric" placeholder="0"><span class="cust-il">سعرة</span></div>';
  h+='<div class="cust-iw"><input class="cust-num" id="cpp'+di+'_'+mi+'" type="number" inputmode="numeric" placeholder="0"><span class="cust-il">بروتين</span></div>';
  h+='<div class="cust-iw"><input class="cust-num" id="ckk'+di+'_'+mi+'" type="number" inputmode="numeric" placeholder="0"><span class="cust-il">كارب</span></div>';
  h+='<div class="cust-iw"><input class="cust-num" id="cff'+di+'_'+mi+'" type="number" inputmode="numeric" placeholder="0"><span class="cust-il">دهون</span></div></div>';
  h+='<div class="cust-btns"><button class="cust-save" onclick="saveCust('+di+','+mi+')">حفظ</button><button class="cust-canc" onclick="tglCust('+di+','+mi+')">إلغاء</button></div>';
  h+='</div>';return h;}
function mealCard(di,mi){
  var m=D[di].meals[mi],s=gs(di,mi),M=MT[m.mt],mm=getMM(di,mi);
  var isS=(m.mt=='s'),sn=isS?snById(s.sSel||m.def):null;
  var title=isS?sn.n:m.tt;
  var h='<div class="card '+M.c+'">';
  h+='<div class="card-top">';
  h+='<div class="c-meta"><div class="c-type">'+M.l+(isS&&sn.pw?' ':'')+'</div><div class="c-title">'+title+'</div></div>';
  h+='<div class="c-cal"><span class="cal-n">'+mm.cal+'</span><span class="cal-l">سعرة</span></div></div>';
  h+='<div class="card-body">';
  if(m.note)h+='<div class="note">'+m.note+'</div>';
  if(s.cust){
    h+='<div class="items"><li style="list-style:none"><span class="dot"></span>'+s.cust.name+'</li></div>';
    h+='<div class="cbadge"><span>وجبة معدّلة: '+mm.cal+' سعرة · '+mm.p+'ج بروتين</span><button class="cbadge-x" onclick="clrCust('+di+','+mi+')">إلغاء</button></div>';
    h+=custUI(di,mi)+'</div></div>';return h;
  }
  h+='<ul class="items">';
  if(isS){for(var i=0;i<sn.it.length;i++)h+='<li><span class="dot"></span>'+sn.it[i]+'</li>';}
  else{
    if(m.ps)h+='<li><span class="dot"></span>'+pLine(m.ps,s.pSel||m.ps.def)+'</li>';
    if(m.cs)h+='<li><span class="dot"></span>'+cLine(m.cs,s.cSel||m.cs.def)+'</li>';
    var ex=m.ex||[];for(var j=0;j<ex.length;j++)h+='<li><span class="dot"></span>'+ex[j]+'</li>';
  }
  h+='</ul>'+mxbox(mm);
  if(isS)h+=snackPills(di,mi,sn.id);
  else{
    if(m.ps&&m.ps.opts.length>1)h+=pills(di,mi,'p',m.ps);
    if(m.cs&&m.cs.opts.length>1)h+=pills(di,mi,'c',m.cs);
  }
  h+=custUI(di,mi);
  h+='</div></div>';return h;}
function bar(lbl,v,max,cls){
  var pct=Math.min(100,Math.round(v/max*100)),over=v>max,fc=over?'pbw':cls;
  var h='<div class="trow"><div class="trh"><span class="tlbl">'+lbl+'</span><span class="tval">'+v+' / '+max+'</span></div>';
  h+='<div class="pb"><div class="pbf '+fc+'" style="width:'+pct+'%"></div></div>';
  if(over)h+='<div style="font-size:11px;color:#DC2626;font-weight:700;margin-top:3px">تجاوزت الحد بـ'+(v-max)+'</div>';
  return h+'</div>';}
function dayTotal(di){
  var t=dayTot(di);
  var h='<div class="day-total"><h3>إجمالي اليوم — مقابل الحد الأعلى الصحي</h3>';
  h+=bar('السعرات',t.cal,T.cal,'pbc')+bar('البروتين',t.p,T.p,'pbp')+bar('الكارب',t.c,T.c,'pbk')+bar('الدهون',t.f,T.f,'pbd');
  h+='<div class="trem">الأساس ~1800 سعرة لنزول ~1 كيلو/أسبوع. تبديل مصادر البروتين والكارب ما يغيّر الأرقام. السناكات قريبة بالسعرات فالتبديل بينها يحرّك المجموع بشكل بسيط جداً.</div></div>';
  return h;}
function suppsHtml(){
  var h='<div class="supps"><h3>المكملات الموصى بها</h3>';
  for(var g=0;g<SUPPS.length;g++){var G=SUPPS[g];
    h+='<div class="sgrp"><span class="spri" style="background:'+G.pb+';color:'+G.pc+'">'+G.pri+'</span>';
    for(var i=0;i<G.items.length;i++){var it=G.items[i];
      h+='<div class="scard" style="background:'+G.cb+';color:'+G.pc+'"><div class="sname" style="color:'+G.cc+'">'+it.n+'</div><div class="sdose">'+it.d+'</div><div class="swhy">'+it.w+'</div></div>';}
    h+='</div>';}
  h+='<div class="sfoot">ابدأ بالأساسي شهر، بعدها أضف الباقي. استشر طبيبك خصوصاً مع إيقاف المنجارو.</div></div>';
  return h;}
function notesHtml(){
  var h='<div class="notes-card"><h3>ملاحظات مهمة</h3>';
  for(var i=0;i<NOTES.length;i++)h+='<div class="note-row"><span class="n-ico"></span><span>'+NOTES[i]+'</span></div>';
  return h+'</div>';}
function renderTabs(){var h='';for(var i=0;i<D.length;i++){h+='<button class="tab'+(i==cur?' on':'')+'" onclick="go('+i+')">'+D[i].day+'</button>';}document.getElementById('tabs').innerHTML=h;}
function render(){
  var di=cur,day=D[di];
  var h='<div class="day-hdr"><span class="day-name">'+day.day+'</span><span class="typ-badge '+day.tb+'">'+day.type+'</span></div>';
  for(var i=0;i<day.meals.length;i++)h+=mealCard(di,i);
  h+=dayTotal(di)+suppsHtml()+notesHtml();
  document.getElementById('page').innerHTML=h;}
function go(i){cur=i;renderTabs();render();window.scrollTo(0,0);}
function setSel(di,mi,w,o){var s=gs(di,mi);if(w=='p')s.pSel=o;else s.cSel=o;render();}
function setSnack(di,mi,id){gs(di,mi).sSel=id;render();}
function tglCust(di,mi){var el=document.getElementById('cp'+di+'_'+mi);if(el)el.classList.toggle('show');}
function saveCust(di,mi){
  var g=function(p){var v=parseInt((document.getElementById(p+di+'_'+mi)||{}).value,10);return isNaN(v)?0:v;};
  var nm=(document.getElementById('cn'+di+'_'+mi)||{}).value||'وجبة معدّلة';
  var s=gs(di,mi);s.cust={name:nm,cal:g('cc'),p:g('cpp'),c:g('ckk'),f:g('cff')};render();}
function clrCust(di,mi){gs(di,mi).cust=null;render();}
renderTabs();render();
</script>
</body>
</html>
